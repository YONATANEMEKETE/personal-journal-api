services:
  postgres:
    image: postgres:16-alpine
    container_name: personal-journal-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: journal
      POSTGRES_PASSWORD: journal_pass
      POSTGRES_DB: personal_journal
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
